name: Sync CloudFormation Templates to S3

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  sync-templates:
    name: Upload templates to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.APP_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload templates to S3
        run: |
          for file in \
            templates/network.yml \
            templates/security-groups.yml \
            templates/vpc-endpoints.yml \
            templates/ecr.yml \
            templates/rds.yml \
            templates/cache.yml \
            templates/application.yml \
            templates/iam.yml \
            templates/cluster.yml \
            templates/scaling.yml \
            templates/storage.yml \
            templates/pipeline.yml \
            templates/oidc.yml \
            templates/main.yml; do
            echo "Uploading $file -> s3://${{ secrets.TEMPLATES_BUCKET }}/$(basename $file)"
            aws s3 cp "$file" "s3://${{ secrets.TEMPLATES_BUCKET }}/$(basename $file)"
          done

  deploy-stacks:
    name: Deploy changed stacks
    runs-on: ubuntu-latest
    needs: sync-templates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.APP_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Detect which stacks changed
        id: changed
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git ls-files)
          fi

          DEPLOY_OIDC=false
          DEPLOY_ECR=false
          DEPLOY_MAIN=false

          while IFS= read -r file; do
            case "$file" in
              templates/oidc.yml)
                DEPLOY_OIDC=true ;;
              templates/ecr.yml)
                DEPLOY_ECR=true ;;
              templates/network.yml|\
              templates/security-groups.yml|\
              templates/vpc-endpoints.yml|\
              templates/rds.yml|\
              templates/cache.yml|\
              templates/application.yml|\
              templates/iam.yml|\
              templates/cluster.yml|\
              templates/scaling.yml|\
              templates/storage.yml|\
              templates/pipeline.yml|\
              templates/main.yml)
                DEPLOY_MAIN=true ;;
            esac
          done <<< "$CHANGED"

          echo "oidc=$DEPLOY_OIDC"   >> "$GITHUB_OUTPUT"
          echo "ecr=$DEPLOY_ECR"     >> "$GITHUB_OUTPUT"
          echo "main=$DEPLOY_MAIN"   >> "$GITHUB_OUTPUT"

      - name: Deploy OIDC stack
        if: steps.changed.outputs.oidc == 'true'
        run: |
          aws cloudformation deploy \
            --template-file templates/oidc.yml \
            --stack-name todo-github-oidc \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Deploy ECR stack
        if: steps.changed.outputs.ecr == 'true'
        run: |
          aws cloudformation deploy \
            --template-file templates/ecr.yml \
            --stack-name todo-ecr \
            --no-fail-on-empty-changeset

      - name: Deploy main stack
        if: steps.changed.outputs.main == 'true'
        run: |
          aws cloudformation deploy \
            --template-file templates/main.yml \
            --stack-name todo \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              TemplatesBucketUrl=https://${{ secrets.TEMPLATES_BUCKET }}.s3.${{ secrets.AWS_REGION }}.amazonaws.com \
              ECRRepositoryName=${{ secrets.ECR_REPOSITORY_NAME }} \
              ECRRepositoryUri=${{ secrets.ECR_REPOSITORY_URI }} \
            --no-fail-on-empty-changeset

  sync-codedeploy:
    name: Zip and upload CodeDeploy artifacts to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.APP_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build and upload deploy.zip
        working-directory: templates/codedeploy
        run: |
          zip deploy.zip appspec.yaml taskdef.json
          echo "Uploading deploy.zip -> s3://${{ secrets.APPSPEC_BUCKET }}/deploy.zip"
          aws s3 cp deploy.zip "s3://${{ secrets.APPSPEC_BUCKET }}/deploy.zip"
