AWSTemplateFormatVersion: '2010-09-09'
Description: Application Load Balancer with blue/green target groups

Parameters:
  SubnetGroup1:
    Type: String
    Description: Public subnet 1 ID for ALB

  SubnetGroup2:
    Type: String
    Description: Public subnet 2 ID for ALB

  VpcId:
    Type: String
    Description: VPC ID

  ALBSecurityGroupId:
    Type: String
    Description: Security group ID for the ALB (created in network stack)

  ALBName:
    Type: String
    Default: ecs-load-balancer

  ListenerPort:
    Type: Number
    Default: 80

  TestListenerPort:
    Type: Number
    Default: 8081

  TargetGroupName:
    Type: String
    Default: todo-target-group

  GreenTargetGroupName:
    Type: String
    Default: todo-target-group-green

  TargetGroupPort:
    Type: Number
    Default: 8080

Resources:
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Ref ALBName
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroupId
      Subnets:
        - !Ref SubnetGroup1
        - !Ref SubnetGroup2
      Tags:
        - Key: Name
          Value: !Ref ALBName
        - Key: Project
          Value: todo

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: !Ref ListenerPort
      Protocol: HTTP

  TestListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    DependsOn: ALBListener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref GreenTargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: !Ref TestListenerPort
      Protocol: HTTP

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Name: !Ref TargetGroupName
      Port: !Ref TargetGroupPort
      Protocol: HTTP
      Tags:
        - Key: Name
          Value: !Ref TargetGroupName
        - Key: Project
          Value: todo
      TargetType: ip
      VpcId: !Ref VpcId

  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 10
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Name: !Ref GreenTargetGroupName
      Port: !Ref TargetGroupPort
      Protocol: HTTP
      Tags:
        - Key: Name
          Value: !Ref GreenTargetGroupName
        - Key: Project
          Value: todo
      TargetType: ip
      VpcId: !Ref VpcId

Outputs:
  ALBTargetGroupArn:
    Value: !Ref ALBTargetGroup
    Description: Blue target group ARN

  ALBListenerArn:
    Value: !Ref ALBListener
    Description: Production listener ARN

  TestListenerArn:
    Value: !Ref TestListener
    Description: Test listener ARN for CodeDeploy green validation

  BlueTargetGroupName:
    Value: !GetAtt ALBTargetGroup.TargetGroupName
    Description: Blue target group name

  GreenTargetGroupName:
    Value: !GetAtt GreenTargetGroup.TargetGroupName
    Description: Green target group name

  ALBDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Description: ALB DNS name
