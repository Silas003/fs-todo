AWSTemplateFormatVersion: '2010-09-09'
Description: VPC, subnets, internet gateway, and route tables

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  AZ1:
    Type: String
    Default: eu-central-1a

  AZ2:
    Type: String
    Default: eu-central-1b

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24

  PrivateECSSubnet1Cidr:
    Type: String
    Default: 10.0.10.0/24

  PrivateECSSubnet2Cidr:
    Type: String
    Default: 10.0.11.0/24

  PrivateRDSSubnet1Cidr:
    Type: String
    Default: 10.0.20.0/24

  PrivateRDSSubnet2Cidr:
    Type: String
    Default: 10.0.21.0/24

  PrivateCacheSubnet1Cidr:
    Type: String
    Default: 10.0.30.0/24

  PrivateCacheSubnet2Cidr:
    Type: String
    Default: 10.0.31.0/24

Resources:
  CustomVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: todo-vpc
        - Key: Project
          Value: todo

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: InternetGatewayAttachment
    Properties:
      AvailabilityZone: !Ref AZ1
      CidrBlock: !Ref PublicSubnet1Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-public-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: InternetGatewayAttachment
    Properties:
      AvailabilityZone: !Ref AZ2
      CidrBlock: !Ref PublicSubnet2Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-public-2

  PrivateECSSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ1
      CidrBlock: !Ref PrivateECSSubnet1Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-ecs-private-1

  PrivateECSSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ2
      CidrBlock: !Ref PrivateECSSubnet2Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-ecs-private-2

  PrivateRDSSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ1
      CidrBlock: !Ref PrivateRDSSubnet1Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-rds-private-1

  PrivateRDSSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ2
      CidrBlock: !Ref PrivateRDSSubnet2Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-rds-private-2

  PrivateCacheSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ1
      CidrBlock: !Ref PrivateCacheSubnet1Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-cache-private-1

  PrivateCacheSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Ref AZ2
      CidrBlock: !Ref PrivateCacheSubnet2Cidr
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-cache-private-2

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: todo-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref CustomVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateECSRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-ecs-private-rt

  PrivateECSSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateECSRouteTable
      SubnetId: !Ref PrivateECSSubnet1

  PrivateECSSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateECSRouteTable
      SubnetId: !Ref PrivateECSSubnet2

  PrivateRDSRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-rds-private-rt

  PrivateRDSSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRDSRouteTable
      SubnetId: !Ref PrivateRDSSubnet1

  PrivateRDSSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRDSRouteTable
      SubnetId: !Ref PrivateRDSSubnet2

  PrivateCacheRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref CustomVPC
      Tags:
        - Key: Name
          Value: todo-cache-private-rt

  PrivateCacheSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateCacheRouteTable
      SubnetId: !Ref PrivateCacheSubnet1

  PrivateCacheSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateCacheRouteTable
      SubnetId: !Ref PrivateCacheSubnet2

Outputs:
  VPCId:
    Value: !Ref CustomVPC
    Description: VPC ID

  VpcCidr:
    Value: !Ref VpcCidr
    Description: VPC CIDR block

  PublicSubnet1Id:
    Value: !Ref PublicSubnet1
    Description: Public Subnet 1 (AZ-a)

  PublicSubnet2Id:
    Value: !Ref PublicSubnet2
    Description: Public Subnet 2 (AZ-b)

  PrivateECSSubnet1Id:
    Value: !Ref PrivateECSSubnet1
    Description: ECS Private Subnet 1 (AZ-a)

  PrivateECSSubnet2Id:
    Value: !Ref PrivateECSSubnet2
    Description: ECS Private Subnet 2 (AZ-b)

  PrivateRDSSubnet1Id:
    Value: !Ref PrivateRDSSubnet1
    Description: RDS Private Subnet 1 (AZ-a)

  PrivateRDSSubnet2Id:
    Value: !Ref PrivateRDSSubnet2
    Description: RDS Private Subnet 2 (AZ-b)

  PrivateCacheSubnet1Id:
    Value: !Ref PrivateCacheSubnet1
    Description: Cache Private Subnet 1 (AZ-a)

  PrivateCacheSubnet2Id:
    Value: !Ref PrivateCacheSubnet2
    Description: Cache Private Subnet 2 (AZ-b)

  PrivateECSRouteTableId:
    Value: !Ref PrivateECSRouteTable
    Description: ECS private route table ID

  PrivateRDSRouteTableId:
    Value: !Ref PrivateRDSRouteTable
    Description: RDS private route table ID

  PrivateCacheRouteTableId:
    Value: !Ref PrivateCacheRouteTable
    Description: Cache private route table ID
